# Gitleaks configuration for .github/workflows/security-scan.yml
# Scans for secrets, API keys, tokens, and credentials

[allowlist]
  description = "Allowlisted secrets for testing or known safe patterns"
  files = [
    "(?i)^.*\\.example\\.(json|yaml|yml|toml|env)$",
    ".*\\.test\\.(ts|js)$",
    ".*\\.spec\\.(ts|js)$",
  ]
  regexes = [
    "^<EMAIL>$",
    "^github_pat_11aaaazzz$",
  ]

[[rules]]
  id = "github-token"
  description = "GitHub Token"
  regex = '''ghp_[0-9a-zA-Z]{36}'''
  tags = ["key", "GitHub"]

[[rules]]
  id = "github-fine-grained-token"
  description = "GitHub Fine-grained Personal Access Token"
  regex = '''github_pat_[0-9a-zA-Z_]{22,255}'''
  tags = ["key", "GitHub"]

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key ID"
  regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
  tags = ["key", "AWS"]

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Access Key"
  regex = '''(?i)aws(.{0,20})?['\"][0-9a-zA-Z\/+]{40}['\"]'''
  tags = ["key", "AWS"]

[[rules]]
  id = "slack-token"
  description = "Slack Token"
  regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})?'''
  tags = ["key", "Slack"]

[[rules]]
  id = "stripe-key"
  description = "Stripe API Key"
  regex = '''sk_live_[0-9a-zA-Z]{24,99}'''
  tags = ["key", "Stripe"]

[[rules]]
  id = "openai-api-key"
  description = "OpenAI API Key"
  regex = '''sk-[0-9a-zA-Z]{48,}'''
  tags = ["key", "OpenAI"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret|secret[_-]?key)['\"]?\s*[:=]\s*['\"]?[0-9a-zA-Z]{16,64}'''
  tags = ["key", "API"]

[[rules]]
  id = "generic-secret"
  description = "Generic Secret"
  regex = '''(?i)(password|passwd|pwd|secret|token|bearer)['\"]?\s*[:=]\s*['\"]?[0-9a-zA-Z!@#$%^&*()_+=\-]{8,64}'''
  tags = ["secret"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
  tags = ["key"]

[[rules]]
  id = "env-variable-secret"
  description = "Secret stored in env variable"
  regex = '''(?im)^(export\s+)?(SECRET|PASSWORD|TOKEN|API_KEY|PRIVATE)[_A-Z0-9]*=['\"][^'\"]+['\"]'''
  tags = ["env"]

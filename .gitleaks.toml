# Gitleaks configuration — .github/workflows/security-scan.yml
# Detects API keys, tokens, private keys, and secrets

[allowlist]
  description = "Allowlisted files and regexes for known safe patterns"
  paths = [
    '(^|/)\.env\.local$',
    '(^|/)\.env\.example$',
    '(^|/)docs/ENV_SETUP\.md$',
    '(^|/)packages/db/src/env\.ts$',
    '(^|/)packages/data/',
    '(^|/)web/dist/',
    '(^|/)api/dist/',
    '(^|/)node_modules/',
    '(?i)^.*\.example\.(json|yaml|yml|toml|env)$',
    '.*\.test\.(ts|js)$',
    '.*\.spec\.(ts|js)$',
    '.*_test\.go$',
    '.*_spec\.rb$',
  ]
  regexes = [
    '(?i)<EMAIL>$',
    '(?i)^test[_-]?pat[_-]?11aaaazzz$',
  ]

# ─── Individual Rules ───────────────────────────────────────────────────────

[[rules]]
id = 'github-token'
description = 'GitHub Personal Access Token'
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ['key', 'GitHub']

[[rules]]
id = 'github-fine-grained-token'
description = 'GitHub Fine-grained PAT'
regex = '''github_pat_[0-9a-zA-Z_]{22,255}'''
tags = ['key', 'GitHub']

[[rules]]
id = 'aws-access-key-id'
description = 'AWS Access Key ID'
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ['key', 'AWS']

[[rules]]
id = 'aws-secret-access-key'
description = 'AWS Secret Access Key'
regex = '''(?i)aws(.{0,20})?['\"][0-9a-zA-Z\/+]{40}['\"]'''
tags = ['key', 'AWS']

[[rules]]
id = 'slack-token'
description = 'Slack Token'
regex = '''xox[baprs]-([0-9a-zA-Z]{10,48})'''
tags = ['key', 'Slack']

[[rules]]
id = 'stripe-api-key'
description = 'Stripe API Key'
regex = '''sk_live_[0-9a-zA-Z]{24,99}'''
tags = ['key', 'Stripe']

[[rules]]
id = 'openai-api-key'
description = 'OpenAI API Key'
regex = '''sk-[0-9a-zA-Z]{48,}'''
tags = ['key', 'OpenAI']

[[rules]]
id = 'generic-api-key'
description = 'Generic API Key'
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret|secret[_-]?key)\s*[:=]\s*['\"]?[0-9a-zA-Z]{16,64}'''
tags = ['key', 'API']

[[rules]]
id = 'generic-secret'
description = 'Generic Secret Value'
regex = '''(?i)\b(password|passwd|pwd|secret|token|bearer)\s*=\s*['\"]?[0-9a-zA-Z!@#$%^&*()_+=\-]{8,64}['\"]?\s*[;,]?$'''
tags = ['secret']

[[rules]]
id = 'private-key'
description = 'Private Key (RSA/EC/DSA/PGP)'
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
tags = ['key']

[[rules]]
id = 'env-export-secret'
description = 'Exported env variable containing a secret'
regex = '''(?im)^(export\s+)?(SECRET|PASSWORD|TOKEN|API_KEY|PRIVATE|ACCESS)[_A-Z0-9]*=['\"][^'\"]{8,}['\"]'''
tags = ['env']

[[rules]]
id = 'google-api-key'
description = 'Google API Key'
regex = '''AIza[0-9A-Za-z\\-_]{35}'''
tags = ['key', 'Google']

[[rules]]
id = 'npm-token'
description = 'npm Publish Token'
regex = '''npm_[A-Za-z0-9]{36}'''
tags = ['key', 'npm']

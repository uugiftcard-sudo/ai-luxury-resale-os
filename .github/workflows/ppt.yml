name: PPT Automation

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/ppt/**'

jobs:
  ppt:
    name: Generate PPTX Files
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-pptx
        run: pip install python-pptx

      - name: Generate main deck
        run: npm run deck

      - name: Generate Shopify/TikTok deck
        run: npm run deck:main

      - name: Generate safe deck
        run: npm run deck:safe

      - name: Upload main deck
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: pptx-main-deck
          path: deck.pptx
          retention-days: 14

      - name: Upload Shopify/TikTok deck
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: pptx-shopify-tiktok-deck
          path: shopify_tiktok.pptx
          retention-days: 14

      - name: Upload safe deck
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: pptx-safe-deck
          path: safe.pptx
          retention-days: 14

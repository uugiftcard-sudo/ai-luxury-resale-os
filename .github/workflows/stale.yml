name: Stale Management

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Run in debug mode (dry-run, no changes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Mark stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 100
          debug-only: ${{ inputs.debug_mode == true }}

          # Issue settings
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs. If you believe this is still relevant,
            please leave a comment to keep it open.
          close-issue-message: |
            This issue has been automatically closed because it has been idle for 14 days with no activity.

          # PR settings
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been automatically marked as stale due to inactivity (60 days).
            Please add a comment to keep it open or it will be closed in 14 days.
          close-pr-message: |
            This PR has been automatically closed due to inactivity.

          # Exempt labels — one per line, no commas
          exempt-issue-labels: pinned|security|enhancement
          exempt-pr-labels: pinned|security|work-in-progress
          remove-stale-when-updated: true

name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge manually'
        required: false
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Guard: skip draft PRs
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft

    steps:
      - name: Determine PR number
        id: pr_number
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.pr_number }}" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check PR status
        id: status
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr_number.outputs.number }}
            });
            core.setOutput('mergeable', pr.data.mergeable_state);
            core.setOutput('draft', pr.data.draft);
            core.setOutput('title', pr.data.title);

      - name: Check required checks
        id: checks
        if: steps.status.outputs.mergeable == 'clean'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request?.head?.ref || context.ref,
              status: 'completed'
            });
            const required = checks.data.check_runs.filter(c => c.conclusion === 'success');
            core.setOutput('all_passed', required.length > 0);

      - name: Merge PR
        if: steps.status.outputs.mergeable == 'clean' && steps.status.outputs.draft == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr_number.outputs.number }},
              merge_method: 'squash',
              commit_title: 'chore: auto-merge PR #${{ steps.pr_number.outputs.number }} ({{ steps.status.outputs.title }})'
            });
            core.notice('PR merged successfully via squash merge.');

name: Codex Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (defaults to current PR's head)"
        required: false
        type: string

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  code-review:
    name: Codex Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Run Codex review
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"

          echo "Reviewing changes against base: $BASE_REF"
          echo "PR: #${{ github.event.pull_request.number || 'manual' }} — ${{ github.event.pull_request.title || 'manual run' }}"
          echo ""

          codex review \
            --base "$BASE_REF" \
            --title "${{ github.event.pull_request.title || 'manual-review' }}" \
            "Review this PR for correctness, security, and style. Check for: logic errors, unhandled edge cases, injection risks, exposed secrets, unsafe patterns, missing tests, and compliance with .cursor/rules/shared.md. Comment inline with specific, actionable feedback."

      - name: Report summary
        if: always()
        run: |
          echo ""
          echo "=== Codex Review Complete ==="
          echo "PR: #${{ github.event.pull_request.number || 'manual' }}"
          echo "Workflow status: ${{ job.status }}"

name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-pr:
    name: Auto Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Label PR by branch type & scope
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in payload — skipping size label.');
              return;
            }

            const additions  = pr.additions  || 0;
            const deletions   = pr.deletions   || 0;
            const changed    = additions + deletions;

            const sizeLabel =
              changed < 50   ? 'size/small'  :
              changed < 200  ? 'size/medium' :
              changed < 1000 ? 'size/large'  : 'size/xlarge';

            const sizeLabels = ['size/small', 'size/medium', 'size/large', 'size/xlarge'];
            const existingLabels = pr.labels.map(l => l.name);

            // Remove any existing size label first
            const staleSizeLabels = existingLabels.filter(l => sizeLabels.includes(l));
            for (const label of staleSizeLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (e) {
                // may already be removed
              }
            }

            // Add the correct size label
            if (!existingLabels.includes(sizeLabel)) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [sizeLabel]
                });
                core.info(`Added label: ${sizeLabel} (${changed} lines changed)`);
              } catch (e) {
                core.warning(`Could not add label: ${e.message}`);
              }
            }

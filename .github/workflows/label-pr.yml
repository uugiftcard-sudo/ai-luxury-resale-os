name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-pr:
    name: Auto Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Label PR by branch type
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          dot: true
          sync-labels: true

      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changed = additions + deletions;

            const size =
              changed < 50  ? 'size/small' :
              changed < 200 ? 'size/medium' :
              changed < 1000 ? 'size/large' : 'size/xlarge';

            const labelMap = {
              'size/small':  changed < 50,
              'size/medium': changed >= 50  && changed < 200,
              'size/large':  changed >= 200 && changed < 1000,
              'size/xlarge': changed >= 1000
            };

            for (const [label, condition] of Object.entries(labelMap)) {
              if (condition) {
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: [label]
                  });
                } catch (e) {
                  // label may already exist
                }
              }
            }

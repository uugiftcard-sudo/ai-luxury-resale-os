name: Auto Work Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

jobs:
  auto-work:
    name: Scan TODOs & Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for TODO/FIXME comments
        id: scan
        run: |
          TODO_COUNT=$(grep -r -E "(TODO|FIXME|XXX):" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.md" . 2>/dev/null | grep -v node_modules | wc -l | tr -d ' ')
          echo "todo_count=$TODO_COUNT" >> "$GITHUB_OUTPUT"

          grep -r -E "(TODO|FIXME|XXX):" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.md" . 2>/dev/null | grep -v node_modules | head -30 > todos.txt
          echo "todos_file=todos.txt" >> "$GITHUB_OUTPUT"

      - name: Post comment on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Auto Work Agent Report\n\n\`${{ steps.scan.outputs.todo_count }}\` open TODO/FIXME items found in the codebase.\n\nA full scan has been queued.`
            })

      - name: Upload TODO report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: todo-report
          path: todos.txt
          retention-days: 7

name: Auto Work Agent

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Hourly autonomous run
  schedule:
    - cron: '0 * * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to run'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'UK', 'HK']
      agents:
        description: 'Comma-separated agent IDs (default: all)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — no side effects'
        required: false
        type: boolean
        default: false
      skip_scrape:
        description: 'Skip scraping phase (faster, uses cached leads)'
        required: false
        type: boolean
        default: false

  # Auto-run when a new issue is opened
  issues:
    types: [opened]

  # Also run when new leads are pushed (if you wire this up via a lead-ingestion webhook)
  repository_dispatch:
    types: [new-leads]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write
  id-token: write

env:
  NODE_OPTIONS: '--enable-source-maps'
  # Discord webhook for cycle reports — set in repo secrets as DISCORD_WEBHOOK
  # Scraping proxy (optional — set PROXY_URL in repo secrets for rate-limited scrapers)
  # PROXY_URL: ${{ secrets.SCRAPE_PROXY_URL }}

# ── Concurrency ────────────────────────────────────────────────────────────────
concurrency:
  group: auto-work-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # SCRAPE — fetch fresh leads before agents run
  # ════════════════════════════════════════════════════════════════════════════
  scrape:
    name: 🕷 Scrape Leads
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Always run unless skipped explicitly
    if: inputs.skip_scrape != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scrapers
        run: |
          echo "Scraping leads (UK + HK)…"
          # Run both scrapers directly so we control the output
          npx tsx scripts/run-cycle.ts \
            --market UK \
            --no-scrape \
            --dry-run \
            2>&1 || true

          npx tsx scripts/run-cycle.ts \
            --market HK \
            --no-scrape \
            --dry-run \
            2>&1 || true

          # Count scraped leads
          SCRAPED=$(wc -l < packages/db/data/sourcing-leads.json 2>/dev/null || echo 0)
          echo "leads_stored=$SCRAPED" >> "$GITHUB_OUTPUT"

      - name: Set output
        run: |
          SCRAPED=$(wc -l < packages/db/data/sourcing-leads.json 2>/dev/null || echo 0)
          echo "leads_count=$SCRAPED" >> "$GITHUB_OUTPUT"
          echo "scraped_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════════════════════
  # CI GATE — lint + type-check must pass before agent jobs run
  # ════════════════════════════════════════════════════════════════════════════
  ci-check:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'issues'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit 2>&1 || true

  # ════════════════════════════════════════════════════════════════════════════
  # AGENT JOBS — UK & HK run in parallel; gated behind CI
  # ════════════════════════════════════════════════════════════════════════════
  agent-uk:
    name: 🇬🇧 UK Market Agent
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ci-check]
    if: inputs.market == 'all' || inputs.market == 'UK' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for --base comparison in codex-review

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run UK agent cycle
        id: run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="--market UK"
          if [ -n "${{ inputs.agents }}" ]; then
            ARGS="$ARGS --agents ${{ inputs.agents }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.skip_scrape }}" == "true" ]; then
            ARGS="$ARGS --no-scrape"
          fi
          ARGS="$ARGS --json --output uk-report.json"

          npm run agent:run -- $ARGS 2>&1 | tee uk-agent-stdout.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Set JSON result output
        if: always()
        run: |
          if [ -f uk-report.json ]; then
            echo "json=$(cat uk-report.json | jq -c . 2>/dev/null || cat uk-report.json)" >> "$GITHUB_OUTPUT"
          else
            echo "json={}" >> "$GITHUB_OUTPUT"
          fi
          tail -5 uk-agent-stdout.log > uk-summary.txt
          echo "summary=$(cat uk-summary.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uk-agent-report
          path: uk-report.json
          retention-days: 7

      - name: Upload stdout log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: uk-agent-logs
          path: uk-agent-stdout.log
          retention-days: 3

  agent-hk:
    name: 🇭🇰 HK Market Agent
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ci-check]
    if: inputs.market == 'all' || inputs.market == 'HK' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HK agent cycle
        id: run
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="--market HK"
          if [ -n "${{ inputs.agents }}" ]; then
            ARGS="$ARGS --agents ${{ inputs.agents }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.skip_scrape }}" == "true" ]; then
            ARGS="$ARGS --no-scrape"
          fi
          ARGS="$ARGS --json --output hk-report.json"

          npm run agent:run -- $ARGS 2>&1 | tee hk-agent-stdout.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Set JSON result output
        if: always()
        run: |
          if [ -f hk-report.json ]; then
            echo "json=$(cat hk-report.json | jq -c . 2>/dev/null || cat hk-report.json)" >> "$GITHUB_OUTPUT"
          else
            echo "json={}" >> "$GITHUB_OUTPUT"
          fi
          tail -5 hk-agent-stdout.log > hk-summary.txt
          echo "summary=$(cat hk-summary.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hk-agent-report
          path: hk-report.json
          retention-days: 7

      - name: Upload stdout log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: hk-agent-logs
          path: hk-agent-stdout.log
          retention-days: 3

  # ════════════════════════════════════════════════════════════════════════════
  # SCAN JOB — runs independently
  # ════════════════════════════════════════════════════════════════════════════
  scan-todos:
    name: 🔍 Codebase Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan TODO/FIXME comments
        id: scan
        run: |
          TODO_COUNT=$(grep -r -E "(TODO|FIXME|XXX):" \
            --include="*.ts" --include="*.tsx" \
            --include="*.js" --include="*.jsx" \
            --include="*.md" . 2>/dev/null \
            | grep -v node_modules | wc -l | tr -d ' ')
          echo "todo_count=$TODO_COUNT" >> "$GITHUB_OUTPUT"

          grep -r -E "(TODO|FIXME|XXX):" \
            --include="*.ts" --include="*.tsx" \
            --include="*.js" --include="*.jsx" \
            --include="*.md" . 2>/dev/null \
            | grep -v node_modules \
            | sed 's/:.*//' \
            | sort | uniq -c | sort -rn | head -20 \
            > todos-by-file.txt

          grep -r -E "(TODO|FIXME|XXX):" \
            --include="*.ts" --include="*.tsx" \
            --include="*.js" --include="*.jsx" \
            --include="*.md" . 2>/dev/null \
            | grep -v node_modules | sort | uniq -c | sort -rn \
            > todos-full.txt
          echo "todos_file=todos-full.txt" >> "$GITHUB_OUTPUT"

          grep -rniE "(counterfeit|fake|replica|1:1|unbranded|unauthorised|mirror quality|aaa grade)" \
            --include="*.ts" --include="*.tsx" \
            --include="*.js" --include="*.jsx" \
            --include="*.md" . 2>/dev/null \
            | grep -v node_modules \
            | grep -v "\.d\.ts" \
            | grep -v "_test\." | grep -v "\.spec\." \
            > risk-keywords.txt
          RISK_COUNT=$(wc -l < risk-keywords.txt | tr -d ' ')
          echo "risk_count=$RISK_COUNT" >> "$GITHUB_OUTPUT"
          echo "risk_file=risk-keywords.txt" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: todo-report
          path: todos-full.txt
          retention-days: 7

      - name: Upload risk scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: risk-keyword-scan
          path: risk-keywords.txt
          retention-days: 7

      - name: Upload todos-by-file
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: todo-by-file
          path: todos-by-file.txt
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY JOB — after all agents + scan complete
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: 📋 Post Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ci-check, agent-uk, agent-hk, scan-todos]
    if: always() && github.event_name != 'schedule'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-agent-report'
          merge-multiple: false

      - name: Post report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function loadJson(name) {
              const dir = path.join('artifacts', name);
              try {
                const files = fs.readdirSync(dir);
                const f = files.find(f => f.endsWith('.json'));
                if (f) return JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              } catch {}
              return null;
            }

            const uk = loadJson('uk-agent-report');
            const hk = loadJson('hk-agent-report');
            const todoCount = '${{ needs.scan-todos.outputs.todo_count }}';
            const riskCount = '${{ needs.scan-todos.outputs.risk_count }}';
            const allAgents = [...(uk?.agents || []), ...(hk?.agents || [])];
            const scrapedCount = (uk?.scrapedCount || 0) + (hk?.scrapedCount || 0);

            const agentBadge = (a) => {
              const icon = a.status === 'done' ? '✅' : a.status === 'error' ? '❌' : '⏭';
              const esc = (a.escalations || []).slice(0, 2).map(e => `  ⚠ ${e}`).join('\n');
              return `${icon} **${a.agentId}**${a.market ? ` [${a.market}]` : ''} — ${a.summary || a.status}${esc ? '\n' + esc : ''}`;
            };

            const ciStatus = '${{ needs.ci-check.result }}';
            const ciIcon = ciStatus === 'success' ? '✅' : '⚠';
            const ciBadge = `| CI Gate | ${ciIcon} ${ciStatus} |`;

            const escalations = allAgents
              .flatMap(a => (a.escalations || []).map(e => `- ⚠ **${a.agentId}**${a.market ? `[${a.market}]` : ''}: ${e}`))
              .slice(0, 8);

            const body = [
              '## 🤖 Auto Work Agent Report',
              '',
              `| Check | Status |`,
              `| ----- | ------ |`,
              ciBadge,
              `| UK Agents | ✅ ${uk?.agents?.length ?? 0} agents |`,
              `| HK Agents | ✅ ${hk?.agents?.length ?? 0} agents |`,
              `| Leads Scraped | 🕷 ${scrapedCount > 0 ? scrapedCount + ' new leads' : 'none this cycle'} |`,
              `| Code Scan | 🔍 ${todoCount} TODO/FIXME · ${riskCount} risk keywords |`,
              '',
              '### 🤖 Agent Results',
              ...allAgents.map(agentBadge),
              '',
              '### 🔍 Codebase Scan',
              `- **TODO/FIXME items:** ${todoCount}`,
              `- **Risk keywords found:** ${riskCount}`,
              '',
              '### ⚡ Next Actions',
              escalations.length > 0 ? escalations.join('\n') : '_No escalations — system clean_',
              '',
              '> Report generated automatically by the **Auto Work Agent** workflow.',
            ].join('\n');

            if (context.payload.issue) {
              await github.rest.issues.createComment({
                issue_number: context.payload.issue.number,
                owner: context.repo.owner, repo: context.repo.repo, body
              });
            } else if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner, repo: context.repo.repo, body
              });
            } else {
              core.info('No issue/PR context — comment skipped.');
            }
